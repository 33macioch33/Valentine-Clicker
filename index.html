<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 Walentynkowy Clicker Miłości</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #FFE4E1 0%, #FFF0F5 100%);
            color: #4A4A4A;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 2s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Header Stats */
        .header-stats {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            z-index: 100;
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.6;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .relationship-status {
            font-size: 16px;
            font-weight: 600;
            color: #FF69B4;
            margin-top: 5px;
        }

        /* Heart Container */
        .heart-container {
            position: relative;
            margin: 120px 0 80px 0;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 3D Heart */
        .heart {
            font-size: 200px;
            line-height: 1;
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 20px 40px rgba(255, 105, 180, 0.3));
            animation: gentlePulse 2s ease-in-out infinite;
            position: relative;
        }

        @keyframes gentlePulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .heart:hover {
            animation: none;
            transform: scale(1.08);
            filter: drop-shadow(0 25px 50px rgba(255, 105, 180, 0.5));
        }

        .heart:active {
            animation: squashStretch 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes squashStretch {
            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(0.9, 1.1);
            }

            50% {
                transform: scale(1.1, 0.9);
            }

            75% {
                transform: scale(0.95, 1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .heart.golden {
            filter: drop-shadow(0 0 30px gold) drop-shadow(0 20px 40px rgba(255, 215, 0, 0.5));
        }

        /* Shop Panel - Hidden initially */
        .shop-panel {
            position: fixed;
            right: 20px;
            top: 120px;
            width: 350px;
            max-height: calc(100vh - 200px);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            opacity: 0;
            transform: translateX(400px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 90;
        }

        .shop-panel.visible {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
        }

        .shop-panel::-webkit-scrollbar {
            width: 6px;
        }

        .shop-panel::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .shop-panel::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #FF69B4, #FF1493);
            border-radius: 10px;
        }

        .shop-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .shop-category {
            margin-bottom: 25px;
        }

        .category-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 12px;
        }

        .upgrade-item {
            background: linear-gradient(135deg, #FFFFFF 0%, #FFF5F7 100%);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .upgrade-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.1) 0%, rgba(255, 20, 147, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .upgrade-item:hover:not(.disabled)::before {
            opacity: 1;
        }

        .upgrade-item:hover:not(.disabled) {
            transform: translateY(-2px) scale(1.02);
            border-color: #FF69B4;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
        }

        .upgrade-item:active:not(.disabled) {
            transform: translateY(0) scale(0.98);
        }

        .upgrade-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .upgrade-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .upgrade-name {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upgrade-count {
            background: linear-gradient(135deg, #FF69B4, #FF1493);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .upgrade-description {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .upgrade-cost {
            font-size: 15px;
            font-weight: 700;
            color: #FF1493;
            position: relative;
            z-index: 1;
        }

        /* Companion Display */
        .companions {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 80;
        }

        .companion {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            background: white;
            border: 4px solid white;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .companion.unlocked {
            opacity: 1;
            transform: scale(1);
        }

        .companion img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: companionFloat 3s ease-in-out infinite;
        }

        @keyframes companionFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* Particles */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 20px;
            will-change: transform, opacity;
        }

        /* Floating Numbers */
        .floating-number {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            will-change: transform, opacity;
        }

        /* Sticker - Physical sticker look */
        .sticker {
            position: fixed;
            pointer-events: none;
            z-index: 8000;
            width: 120px;
            height: 120px;
            background: white;
            border: 3px solid white;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            padding: 5px;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            will-change: transform, opacity;
        }

        .sticker img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0) rotate(-10deg);
                opacity: 0;
            }

            60% {
                transform: scale(1.2) rotate(5deg);
                opacity: 1;
            }

            100% {
                transform: scale(1) rotate(-2deg);
                opacity: 1;
            }
        }

        @keyframes fadeOutSticker {
            0% {
                opacity: 1;
                transform: scale(1) rotate(-2deg);
            }

            100% {
                opacity: 0;
                transform: scale(0.8) rotate(10deg);
            }
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        .reset-btn {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            color: #FF1493;
            border: 2px solid #FF69B4;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.2);
        }

        .reset-btn:hover {
            background: linear-gradient(135deg, #FF69B4, #FF1493);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 105, 180, 0.4);
        }

        /* Level Up Notification */
        .level-up-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 40px 60px;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            z-index: 20000;
            text-align: center;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .level-up-notification.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .level-up-title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #FF69B4, #FF1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .level-up-message {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }

        /* ========== PERSONALIZATION SECTION ========== */
        .personal-message {
            font-size: 16px;
            font-style: italic;
            color: #FF69B4;
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 105, 180, 0.1);
            border-radius: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-stats {
                flex-direction: column;
                gap: 15px;
                padding: 15px 25px;
            }

            .heart {
                font-size: 150px;
            }

            .shop-panel {
                position: fixed;
                right: 10px;
                left: 10px;
                width: auto;
                top: auto;
                bottom: 0;
                max-height: 50vh;
                border-radius: 30px 30px 0 0;
            }

            .shop-panel.visible {
                transform: translateY(0);
            }

            .shop-panel:not(.visible) {
                transform: translateY(100%);
            }

            .companions {
                bottom: 20px;
                gap: 15px;
            }

            .companion {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>

            { level: 20, name: "Na Zawsze", threshold: 80000, gradient: "linear-gradient(135deg, #FFD700 0%, #FF69B4 50%, #8A2BE2 100%)", message: "To dopiero początek... 💍" }
        ];

        // ============ UPGRADE DEFINITIONS ============
        const UPGRADES = {
            manual: [
                { id: 'hug', name: "Ciepłe Uściski", emoji: "🤗", baseCost: 50, value: 1, description: "+1 na kliknięcie" },
                { id: 'hold', name: "Trzymanie za Ręce", emoji: "🤝", baseCost: 250, value: 5, description: "+5 na kliknięcie" },
                { id: 'kiss', name: "Słodkie Pocałunki", emoji: "💋", baseCost: 1000, value: 20, description: "+20 na kliknięcie" },
                { id: 'cuddle', name: "Głębokie Przytulanie", emoji: "🫂", baseCost: 5000, value: 100, description: "+100 na kliknięcie" },
                { id: 'passion', name: "Czysta Pasja", emoji: "🔥", baseCost: 25000, value: 500, description: "+500 na kliknięcie" }
            ],
            auto: [
                { id: 'text', name: "Słodkie SMS-y", emoji: "💬", baseCost: 100, value: 1, description: "+1/sek" },
                { id: 'call', name: "Rozmowy Telefoniczne", emoji: "📞", baseCost: 500, value: 5, description: "+5/sek" },
                { id: 'date', name: "Wieczorne Randki", emoji: "🌙", baseCost: 2500, value: 25, description: "+25/sek" },
                { id: 'trip', name: "Romantyczne Wyjazdy", emoji: "✈️", baseCost: 12000, value: 120, description: "+120/sek" },
                { id: 'life', name: "Wspólne Życie", emoji: "🏡", baseCost: 60000, value: 600, description: "+600/sek" }
            ],
            special: [
                { id: 'music', name: "Muzyka Miłości", emoji: "🎵", baseCost: 3000, description: "Odtwarzaj romantyczną muzykę", effect: 'music' },
                { id: 'rain', name: "Deszcz Naklejek", emoji: "🌈", baseCost: 5000, description: "Częstsze naklejki!", effect: 'stickerRain' },
                { id: 'golden', name: "Złote Serce", emoji: "✨", baseCost: 15000, description: "Efekt świecącego serca", effect: 'goldenHeart' },
                { id: 'companion1', name: "Słodki Miś", emoji: "🐻", baseCost: 8000, description: "Odblokuj towarzysza", effect: 'companion1' },
                { id: 'companion2', name: "Kotek Mochi", emoji: "🐱", baseCost: 20000, description: "Odblokuj towarzysza", effect: 'companion2' },
                { id: 'companion3', name: "Ptaszek Miłości", emoji: "🐦", baseCost: 40000, description: "Odblokuj towarzysza", effect: 'companion3' }
            ]
        };

        // ============ DOM ELEMENTS ============
        const elements = {
            heart: document.getElementById('mainHeart'),
            heartContainer: document.getElementById('heartContainer'),
            loveCount: document.getElementById('loveCount'),
            lovePerSecond: document.getElementById('lovePerSecond'),
            levelNumber: document.getElementById('levelNumber'),
            relationshipStatus: document.getElementById('relationshipStatus'),
            shopPanel: document.getElementById('shopPanel'),
            levelUpNotification: document.getElementById('levelUpNotification'),
            levelUpTitle: document.getElementById('levelUpTitle'),
            levelUpMessage: document.getElementById('levelUpMessage'),
            personalMessage: document.getElementById('personalMessage')
        };

        // ============ PARTICLE SYSTEM WITH RAF ============
        const particles = [];

        class Particle {
            constructor(x, y, emoji) {
                this.x = x;
                this.y = y;
                this.emoji = emoji;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10 - 5;
                this.gravity = 0.3;
                this.life = 1;
                this.decay = 0.02;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 10;

                this.element = document.createElement('div');
                this.element.className = 'particle';
                this.element.textContent = emoji;
                this.element.style.left = x + 'px';
                this.element.style.top = y + 'px';
                this.element.style.transform = `rotate(${this.rotation}deg)`;
                document.body.appendChild(this.element);
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;

                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                this.element.style.opacity = this.life;
                this.element.style.transform = `rotate(${this.rotation}deg) scale(${this.life})`;

                return this.life > 0;
            }

            destroy() {
                this.element.remove();
            }
        }

        function animateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].update()) {
                    particles[i].destroy();
                    particles.splice(i, 1);
                }
            }

            if (particles.length > 0) {
                requestAnimationFrame(animateParticles);
            }
        }

        function spawnParticles(x, y, count = 8) {
            const emojis = ['❤️', '💕', '💖', '✨', '⭐', '💫'];

            for (let i = 0; i < count; i++) {
                const emoji = emojis[Math.floor(Math.random() * emojis.length)];
                particles.push(new Particle(x, y, emoji));
            }

            if (particles.length === count) {
                requestAnimationFrame(animateParticles);
            }
        }

        // ============ FLOATING NUMBERS ============
        function showFloatingNumber(x, y, value) {
            const floatingNum = document.createElement('div');
            floatingNum.className = 'floating-number';
            floatingNum.textContent = `+${formatNumber(value)}`;

            if (value >= 500) {
                floatingNum.style.fontSize = '48px';
                floatingNum.style.color = '#FFD700';
            } else if (value >= 100) {
                floatingNum.style.fontSize = '36px';
                floatingNum.style.color = '#FF69B4';
            } else if (value >= 10) {
                floatingNum.style.fontSize = '28px';
                floatingNum.style.color = '#FF1493';
            } else {
                floatingNum.style.fontSize = '24px';
                floatingNum.style.color = '#FFF';
            }

            floatingNum.style.left = x + 'px';
            floatingNum.style.top = y + 'px';

            document.body.appendChild(floatingNum);

            let opacity = 1;
            let offsetY = 0;
            const animate = () => {
                offsetY += 2;
                opacity -= 0.02;

                floatingNum.style.transform = `translateY(-${offsetY}px)`;
                floatingNum.style.opacity = opacity;

                if (opacity > 0) {
                    requestAnimationFrame(animate);
                } else {
                    floatingNum.remove();
                }
            };

            requestAnimationFrame(animate);
        }

        // ============ STICKER SYSTEM ============
        function spawnSticker(x = null, y = null) {
            const sticker = document.createElement('div');
            sticker.className = 'sticker';

            const img = document.createElement('img');
            img.src = STICKER_LIBRARY[Math.floor(Math.random() * STICKER_LIBRARY.length)];
            sticker.appendChild(img);

            // Random position if not specified
            if (x === null) x = Math.random() * (window.innerWidth - 150) + 75;
            if (y === null) y = Math.random() * (window.innerHeight - 150) + 75;

            sticker.style.left = x + 'px';
            sticker.style.top = y + 'px';

            document.body.appendChild(sticker);

            setTimeout(() => {
                sticker.style.animation = 'fadeOutSticker 0.5s ease-out forwards';
                setTimeout(() => sticker.remove(), 500);
            }, 3000);
        }

        function stickerBurst(count = 10) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => spawnSticker(), i * 100);
            }
        }

        // ============ HEART CLICK HANDLER ============
        function handleHeartClick(e) {
            const x = e.clientX || e.touches?.[0]?.clientX || window.innerWidth / 2;
            const y = e.clientY || e.touches?.[0]?.clientY || window.innerHeight / 2;

            // Add love
            gameState.love += gameState.clickValue;
            gameState.totalClicks++;

            // Visual feedback
            showFloatingNumber(x, y, gameState.clickValue);
            spawnParticles(x, y, 8);

            // 5% chance for random sticker
            if (Math.random() < 0.05 || gameState.stickerRainActive) {
                spawnSticker(x, y);
            }

            // Check for level up
            checkLevelUp();

            // Update UI
            updateUI();
        }

        // ============ LEVEL SYSTEM ============
        function checkLevelUp() {
            const newLevel = LEVELS.find(l =>
                gameState.love >= l.threshold && l.level > gameState.level
            );

            if (newLevel) {
                gameState.level = newLevel.level;
                levelUp(newLevel);
            }
        }

        function levelUp(levelData) {
            // Update background
            document.body.style.background = levelData.gradient;

            // Show notification
            elements.levelUpTitle.textContent = `Level ${levelData.level}!`;
            elements.levelUpMessage.textContent = levelData.name;

            // ========== PERSONALIZATION: Custom messages for special levels ==========
            if (levelData.message) {
                elements.personalMessage.textContent = levelData.message;
                elements.personalMessage.style.display = 'block';
            } else {
                elements.personalMessage.style.display = 'none';
            }

            elements.levelUpNotification.classList.add('active');

            // Sticker burst
            stickerBurst(15);

            // Hide notification after 3 seconds
            setTimeout(() => {
                elements.levelUpNotification.classList.remove('active');
            }, 3000);

            // Update UI
            updateUI();
        }

        // ============ SHOP SYSTEM ============
        function renderShop() {
            // Manual upgrades
            const manualContainer = document.getElementById('manualUpgrades');
            manualContainer.innerHTML = '';
            UPGRADES.manual.forEach((upgrade, index) => {
                manualContainer.appendChild(createUpgradeElement(upgrade, 'manual', index));
            });

            // Auto upgrades
            const autoContainer = document.getElementById('autoUpgrades');
            autoContainer.innerHTML = '';
            UPGRADES.auto.forEach((upgrade, index) => {
                autoContainer.appendChild(createUpgradeElement(upgrade, 'auto', index));
            });

            // Special upgrades
            const specialContainer = document.getElementById('specialUpgrades');
            specialContainer.innerHTML = '';
            UPGRADES.special.forEach((upgrade, index) => {
                specialContainer.appendChild(createUpgradeElement(upgrade, 'special', index));
            });
        }

        function createUpgradeElement(upgrade, category, index) {
            const div = document.createElement('div');
            div.className = 'upgrade-item';
            div.dataset.category = category;
            div.dataset.index = index;

            const count = gameState.upgrades[category][index] || 0;
            const cost = calculateCost(upgrade.baseCost, count);

            div.innerHTML = `
                <div class="upgrade-header">
                    <div class="upgrade-name">${upgrade.emoji} ${upgrade.name}</div>
                    ${category !== 'special' || count > 0 ? `<div class="upgrade-count">${count}</div>` : ''}
                </div>
                <div class="upgrade-description">${upgrade.description}</div>
                <div class="upgrade-cost">💖 ${formatNumber(cost)}</div>
            `;

            div.addEventListener('click', () => purchaseUpgrade(category, index));

            return div;
        }

        function purchaseUpgrade(category, index) {
            const upgrade = UPGRADES[category][index];
            const count = gameState.upgrades[category][index] || 0;
            const cost = calculateCost(upgrade.baseCost, count);

            if (gameState.love >= cost) {
                gameState.love -= cost;
                gameState.upgrades[category][index] = count + 1;

                // Apply effect
                if (category === 'manual') {
                    gameState.clickValue += upgrade.value;
                } else if (category === 'auto') {
                    gameState.lovePerSecond += upgrade.value;
                } else if (category === 'special') {
                    applySpecialEffect(upgrade.effect);
                }

                // Update shop
                renderShop();
                updateUI();
                saveGame();

                // Visual feedback
                spawnSticker();
            }
        }

        function applySpecialEffect(effect) {
            if (effect === 'stickerRain') {
                gameState.stickerRainActive = true;
            } else if (effect === 'goldenHeart') {
                gameState.goldenHeartActive = true;
                elements.heart.classList.add('golden');
            } else if (effect.startsWith('companion')) {
                const companionNum = effect.slice(-1);
                document.getElementById(`companion${companionNum}`).classList.add('unlocked');
            } else if (effect === 'music') {
                playMusic();
            }
        }

        function calculateCost(baseCost, count) {
            return Math.floor(baseCost * Math.pow(1.15, count));
        }



        // ============ YOUTUBE MUSIC SYSTEM ============
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: '2Bc9ET7XGDg',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': '2Bc9ET7XGDg'
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setVolume(50);
            if (gameState.musicActive) {
                event.target.playVideo();
            }
        }

        function playMusic() {
            gameState.musicActive = true;
            if (player && player.playVideo) {
                player.playVideo();
            }
            saveGame();
        }
        function passiveIncome() {
            if (gameState.lovePerSecond > 0) {
                gameState.love += gameState.lovePerSecond / 10;
                checkLevelUp();
                updateUI();
            }
        }

        function updateUI() {
            elements.loveCount.textContent = formatNumber(Math.floor(gameState.love));
            elements.lovePerSecond.textContent = formatNumber(gameState.lovePerSecond);
            elements.levelNumber.textContent = gameState.level;

            const currentLevel = LEVELS.find(l => l.level === gameState.level);
            if (currentLevel) {
                elements.relationshipStatus.textContent = currentLevel.name;
            }

            // Show shop after 50 love points
            if (gameState.love >= 50 && !elements.shopPanel.classList.contains('visible')) {
                elements.shopPanel.classList.add('visible');
            }

            // Update shop button states
            document.querySelectorAll('.upgrade-item').forEach(item => {
                const category = item.dataset.category;
                const index = parseInt(item.dataset.index);
                const upgrade = UPGRADES[category][index];
                const count = gameState.upgrades[category][index] || 0;
                const cost = calculateCost(upgrade.baseCost, count);

                if (gameState.love < cost) {
                    item.classList.add('disabled');
                } else {
                    item.classList.remove('disabled');
                }
            });
        }

        // ============ SAVE/LOAD SYSTEM ============
        function saveGame() {
            localStorage.setItem('valentineStimulationSave', JSON.stringify(gameState));
        }

        function loadGame() {
            const saved = localStorage.getItem('valentineStimulationSave');
            if (saved) {
                const loadedState = JSON.parse(saved);
                Object.assign(gameState, loadedState);

                // Apply loaded effects
                const currentLevel = LEVELS.find(l => l.level === gameState.level);
                if (currentLevel) {
                    document.body.style.background = currentLevel.gradient;
                }

                if (gameState.goldenHeartActive) {
                    elements.heart.classList.add('golden');
                }

                gameState.unlockedCompanions.forEach(companionId => {
                    document.getElementById(`companion${companionId}`).classList.add('unlocked');
                });

                if (gameState.love >= 50) {
                    elements.shopPanel.classList.add('visible');
                }


                if (gameState.musicActive && player && player.playVideo) {
                    player.playVideo();
                }
            }
        }

        function resetGame() {
            if (confirm('Are you sure you want to reset all progress? 💔')) {
                localStorage.removeItem('valentineStimulationSave');
                location.reload();
            }
        }

        // ============ UTILITY FUNCTIONS ============
        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return Math.floor(num).toString();
        }

        // ============ INITIALIZATION ============
        function init() {
            // Initialize upgrade counts
            Object.keys(UPGRADES).forEach(category => {
                gameState.upgrades[category] = new Array(UPGRADES[category].length).fill(0);
            });

            // Load saved game
            loadGame();

            // Render shop
            renderShop();

            // Event listeners
            elements.heartContainer.addEventListener('click', handleHeartClick);
            elements.heartContainer.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleHeartClick(e);
            });

            // Game loops
            setInterval(passiveIncome, 100);
            setInterval(saveGame, 5000);
            setInterval(updateUI, 100);

            // Initial update
            updateUI();
        }

        // Start the game
        init();


    </script>
